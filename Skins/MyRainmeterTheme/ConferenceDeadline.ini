[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[MeasureCountdown]
Measure=Script
ScriptFile=#CURRENTPATH#Deadline.lua
Deadline=#Deadline#

[Variables]
@Include=#CURRENTPATH#Variables.inc

CardBg=245,245,245,255
CardBorder=210,210,210,255
TitleColor=40,70,110,255
SubColor=90,90,90,255
TextColor=50,50,50,255
NoteColor=40,110,230,255
FontName=Segoe UI

[MeterCard]
Meter=Shape
Shape=Rectangle 0,0,#CardWidth#,#CardHeight#,0 | Fill Color 245,245,245,255 | StrokeWidth 0.75 | Stroke Color 0,0,0,255

[MeterTitle]
Meter=String
X = 4
Y=-3
W=58
H=34
FontFace=#FontName#
FontSize=20
FontColor=#TitleColor#
AntiAlias=1
StringStyle=Bold
Text=#ConferenceName# 

[MeterCountdown]
Meter=String
MeasureName=MeasureCountdown
X=144
Y=2
W=100
H=36
FontFace=#FontName#
FontSize=17
FontColor=110,110,110,255
AntiAlias=1
StringStyle=Bold
Text=%1

[MeterLine2]
Meter=String
X = 4
Y=25
W=100
H=16
FontFace=#FontName#
FontSize=12
FontColor=#TextColor#
AntiAlias=1
Text=#ConferenceInfo# 

[MeterLine3]
Meter=String
X = 4
Y=41
W=340
H=38
FontFace=#FontName#
FontSize=12
FontColor=#TextColor#
AntiAlias=1
ClipString=2
Text=#ConferenceDesc#

[MeterLine4]
Meter=String
X = 4
Y=57
W=300
H=38
FontFace=#FontName#
FontSize=12
FontColor=#TextColor#
AntiAlias=1
ClipString=2
Text=#ConferenceSite#

[MeterLine5]
Meter=String
X = 4
Y=73
W=60
H=20
FontFace=#FontName#
FontSize=12
FontColor=0,0,0,255
AntiAlias=1
Text=#ConferenceNote#
InlineSetting=Weight | 700
InlinePattern=May 16|May 22
